name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lua:
    name: Lint Lua files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Format
        run: |
          make formatlua
          git diff --exit-code

      - name: Lint
        run: make checklua

  queries:
    name: Lint query files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Format
        run: |
          make formatquery
          git diff --exit-code

      - name: Lint
        run: make lintquery


